name: Get the data from Tableau Public
run-name: ${{ github.actor }} is getting data from Tableau Public🚀
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  Get_the_Tableau_Public_data:
    permissions:
      id-token: write
      actions: write
      checks: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
      - name: Configure AWS credentials
        if: ${{ vars.S3_BUCKET != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
      - name: Run script
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_PREFIX: ${{ vars.S3_PREFIX || 'tableau_public' }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
        run: |
          python get_data.py
      - name: Deploy (S3未設定時のみ従来のCSV push)
        if: ${{ vars.S3_BUCKET == '' }}
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "取得したデータをpush"
          git push
      - run: echo "🍏 This job's status is ${{ job.status }}."
