name: Migrate historical CSVs to S3
run-name: 過去CSVデータのS3一括移行（1回限り）
on:
  workflow_dispatch:
jobs:
  migrate:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
      - name: Run migration
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_PREFIX: ${{ vars.S3_PREFIX || 'tableau_public' }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}
        run: |
          python migrate_to_s3.py
